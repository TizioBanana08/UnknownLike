<html>
    <head>
        <title>UnknownLike</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="game-container">
            <div class="battle-area">
                <div class="entity" id="player-card">
                    <h2 id="p-name">Eroe</h2>
                    <img id="p-sprite-img" src="" width=100>
                    <p>HP: <span id="p-hp">100</span></p>
                    <p>Arma: <span id="p-weapon">Spada</span></p>
                </div>
                <div class="vs">VS</div>
                <div class="entity" id="enemy-card">
                    <h2 id="e-name">Mostro</h2>
                    <div class="sprite" id="e-sprite">👾</div>
                    <p>HP: <span id="e-hp">80</span></p>
                    <p>Potenza: <span id="e-atk">10</span></p>
                </div>
                <div class="actions">
                    <button onclick="attaccoGiocatore()">Attacca con l'arma!</button>
                </div>
                <ul id="battle-log"></ul>
        </div>
        <script src="renderer.js"></script>
    </body>
</html>
