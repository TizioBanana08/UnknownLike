<html>
    <head>
        <title>UnknownLike</title>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
    </head>
    <body>
        <div id="main-menu">
            <div class="menu-content">
                <h1 class="game-title">UNKNOWN LIKE</h1>
                <div class="menu-options">
                    <button onclick="startGame()">INIZIA PARTITA</button>
                    <button onclick="openGrimorie()">GRIMORIO</button>
                    <button onclick="quitGame()">ESCI</button>
                </div>
            </div>
        </div>
        <div class="game-container">
            <div class="battle-area">
                <div class="entity" id="player-card">
                    <h2 id="p-name">Eroe</h2>
                    <div class="sprite-container">
                        <img id="p-sprite-img" src="">
                    </div>
                    <p><span style="font-weight: bold;">HP:</span> <span id="p-hp">100</span></p>
                    <p><span style="font-weight: bold;">Arma:</span> <span id="p-weapon">Spada</span></p>
                    
                    <div class="health-bar-container">
                        <div id="p-health-bar" class="health-bar"></div>
                    </div>
                </div>
                <div class="vs">VS</div>
                <div class="entity" id="enemy-card">
                    <h2 id="e-name">Mostro</h2>
                    <div class="sprite-container">
                        <img id="e-sprite-img" src="">
                    </div>
                    <p><span style="font-weight: bold;">HP:</span> <span id="e-hp">80</span></p>
                    <p><span style="font-weight: bold;">Potenza:</span> <span id="e-atk">10</span></p>
                    <div class="health-bar-container">
                        <div id="e-health-bar" class="health-bar"></div>
                    </div>
                </div>
            </div>
            <div id="bottom-bar">
                <div class="log-container">
                    <div id="title-log">
                        <p>BATTLE LOG</p>
                    </div>
                    <ul id="battle-log"></ul>
                </div>
                <div class="inventory-container">
                    <div class="item-container" id="weapon-container">
                        <p>Arma in uso:</p>
                        <img id="weapon-sprite-img" src="">
                    </div>
                    <div class="item-container">
                        <p>Armatura in uso:</p>
                        <img id="armor-sprite-img" src="">
                    </div>
                </div>
                <div id="item-description" class="description-box hidden">
                    <h3 id="desc-name">Nome Item</h3>
                    <p id="desc-text">Descrizione dell'effetto...</p>
                </div>
                <div class="actions-container">
                    <button onclick="attaccoGiocatore()" id="atk-button">Attacca con l'arma!</button>
                    <button onclick="attaccoSpeciale()" id="special-atk-button">Attaco speciale!</button>
                    <button onclick="cura()" id="heal-button">Curati!</button>
                </div>
                
            </div>
            
        </div>
        <div id="game-over-screen" class="hidden">
            <div class="game-over-content">
                <h1>SEI STATO SCONFITTO</h1>
                <p>Il tuo viaggio finisce qui...</p>
                <div class="game-over-buttons">
                    <button onclick="restartGame()">Riprova</button>
                    <button onclick="quitGame()">Esci dal Gioco</button>
                </div>
            </div>
        </div>
        <script src="renderer.js"></script>
    </body>
</html>
